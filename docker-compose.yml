version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile

    container_name: booking_app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./src:/var/www

    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: booking
      DB_USERNAME: booking
      DB_PASSWORD: secret

    depends_on:
      db:
        condition: service_healthy

    networks:
      - booking_network

  nginx:
    image: nginx:1.25-alpine

    container_name: booking_nginx

    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - booking_network

  db:
    image: mysql:8.0

    container_name: booking_db

    restart: unless-stopped

    ports:
      - "3306:3306"

    environment:
      MYSQL_DATABASE: booking
      MYSQL_USER: booking
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root

    command: --default-authentication-plugin=mysql_native_password

    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

    networks:
      - booking_network

networks:
  booking_network:
    driver: bridge

volumes:
  db_data: