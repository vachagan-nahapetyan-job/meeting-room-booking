services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: booking_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - booking_network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  nginx:
    image: nginx:1.25-alpine
    container_name: booking_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - booking_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: booking_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: booking
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: booking
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - booking_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  booking_network:
    driver: bridge

volumes:
  db_data:
